<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Мандри світом</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', 
    }
  </script>

  <!-- Кастомні стилі -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="transition-colors duration-500">

  <!-- Header -->
  <header class="text-center py-10 bg-gradient-to-r from-blue-200 to-teal-200 dark:from-indigo-900 dark:to-purple-800 transition-colors duration-500">
    <h1 class="text-4xl font-bold mb-2">Мандри світом з Андрієм!!!</h1>
    <p class="text-lg mb-4">Відкрий нові горизонти та країни разом зі мною</p>
    <button id="theme-toggle" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition">Змінити тему</button>
  </header>

  <!-- Відгуки туристів -->
  <section id="comments" class="max-w-4xl mx-auto my-10 px-4">
    <h2 class="text-2xl font-semibold mb-4 text-center">Відгуки туристів</h2>
    <div id="comments-list" class="space-y-4"></div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-6 bg-gray-100 dark:bg-gray-900 transition-colors duration-500">
    <p>© 2026 Мандри світом</p>
    <div id="browser-info" class="mt-2 text-sm"></div>
  </footer>

  <!-- Модальне вікно підписки -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white dark:bg-gray-900 text-black dark:text-white p-6 rounded-xl w-96 shadow-lg relative">
      <span id="close-modal" class="absolute top-2 right-3 text-2xl cursor-pointer">&times;</span>
      <h2 class="text-xl font-bold mb-4">Підписка на нові маршрути</h2>
      <form action="https://formspree.io/f/mkopgekd" method="POST" class="space-y-3">
        <input type="text" name="name" placeholder="Ім’я" required class="w-full p-2 border rounded">
        <input type="email" name="email" placeholder="Email" required class="w-full p-2 border rounded">
        <input type="tel" name="phone" placeholder="Телефон" class="w-full p-2 border rounded">
        <textarea name="message" placeholder="Ваші побажання чи коментарі" class="w-full p-2 border rounded h-24"></textarea>
        <button type="submit" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600 transition">Підписатися</button>
      </form>
    </div>
  </div>

  <!-- Скрипти -->
  <script src="script.js"></script>
  <script>
    // Скрипт для перемикання теми
    const toggleButton = document.getElementById('theme-toggle');
    const body = document.body;

    // Автоматично вибираємо тему за часом
    window.addEventListener('DOMContentLoaded', () => {
      const hour = new Date().getHours();
      if (hour >= 7 && hour < 21) {
        body.classList.remove('dark');
      } else {
        body.classList.add('dark');
      }
    });

    toggleButton.addEventListener('click', () => {
      body.classList.toggle('dark');
    });
  </script>
</body>
</html>
